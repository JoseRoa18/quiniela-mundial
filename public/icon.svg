    <!-- Copa -->
    <path d="M164 116h184v52c0 82-41 138-92 138s-92-56-92-138z" fill="url(#gold)"/>
    <!-- Brillo en la copa -->
    <path d="M196 132h26v40c0 30 6 58 16 78-26-18-42-58-42-104z" fill="#FFFFFF" opacity="0.18"/>
    <!-- Estrella central -->
    <path d="M256 168l15.5 36 39 3.2-29.7 25.6 9 38-33.8-20.7-33.8 20.7 9-38-29.7-25.6 39-3.2z" fill="#0B0F17" opacity="0.22"/>
    <!-- Cuello -->
    <rect x="240" y="300" width="32" height="42" fill="url(#goldDark)"/>
    <!-- Base superior -->
    <path d="M198 342h116l-13 34h-90z" fill="url(#gold)"/>
    <!-- Plataforma -->
