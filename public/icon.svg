<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#1c2740"/>
      <stop offset="55%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#06090F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#2D7BFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2D7BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEFB0"/>
      <stop offset="42%" stop-color="#FFC83D"/>
      <stop offset="100%" stop-color="#DF9E2A"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B23A"/>
      <stop offset="100%" stop-color="#C9881F"/>
