  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="256" cy="210" r="170" fill="url(#glow)"/>

  <!-- Trofeo -->
  <g>
    <!-- Asa izquierda -->
    <path d="M170 138c-52 0-78 30-78 70 0 42 31 71 74 73l3-30c-27-2-45-21-45-43 0-23 16-38 49-38z" fill="url(#goldDark)"/>
